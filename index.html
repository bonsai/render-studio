<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Render Studio</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="app">
    <nav id="topnav">
      <span class="logo" id="app-title">Render Studio</span>
      <a href="index.html" class="active">Shaders</a>
      <a href="scenes.html">Scenes</a>
      <a href="raytracer.html">Ray Tracer</a>
      <a href="egg.html">WebGPU Egg</a>
    </nav>
    <div id="workspace">
      <div id="sidebar">
        <div id="shader-list"></div>
      </div>
      <div id="main">
        <div id="canvas-wrap">
          <canvas id="c"></canvas>
        </div>
        <div id="info">
          <div class="title" id="info-title">Select a shader</div>
          <div id="info-desc"></div>
        </div>
      </div>
    </div>
  </div>

  <script type="module">
    const bust = '?t=' + Date.now();
    const [shadersData, implData, uiData] = await Promise.all([
      fetch('data/shaders.json' + bust).then(r => r.json()),
      fetch('data/impl.json' + bust).then(r => r.json()),
      fetch('data/ui.json' + bust).then(r => r.json())
    ]);

    document.getElementById('app-title').textContent = uiData.app.title;

    const canvas = document.getElementById('c');
    const gl = canvas.getContext('webgl2') || canvas.getContext('webgl');
    if (!gl) { document.getElementById('info-desc').textContent = 'WebGL is not supported.'; }

    function resize() {
      const dpr = Math.min(window.devicePixelRatio, 2);
      canvas.width = canvas.clientWidth * dpr;
      canvas.height = canvas.clientHeight * dpr;
      if (gl) gl.viewport(0, 0, canvas.width, canvas.height);
    }
    window.addEventListener('resize', resize);
    resize();

    const buf = gl.createBuffer();
    gl.bindBuffer(gl.ARRAY_BUFFER, buf);
    gl.bufferData(gl.ARRAY_BUFFER, new Float32Array([-1,-1, 1,-1, -1,1, 1,1]), gl.STATIC_DRAW);

    function compileShader(src, type) {
      const s = gl.createShader(type);
      gl.shaderSource(s, src);
      gl.compileShader(s);
      if (!gl.getShaderParameter(s, gl.COMPILE_STATUS)) {
        console.error('[' + (type === gl.VERTEX_SHADER ? 'VS' : 'FS') + ']', gl.getShaderInfoLog(s));
        return null;
      }
      return s;
    }

    let currentProgram = null;
    let startTime = Date.now();

    function loadShader(name) {
      const shader = implData[name];
      if (!shader) return;

      const vs = compileShader(shader.vertex, gl.VERTEX_SHADER);
      const fs = compileShader(shader.fragment, gl.FRAGMENT_SHADER);
      if (!vs || !fs) return;

      const p = gl.createProgram();
      gl.attachShader(p, vs);
      gl.attachShader(p, fs);
      gl.linkProgram(p);
      if (!gl.getProgramParameter(p, gl.LINK_STATUS)) {
        console.error(gl.getProgramInfoLog(p));
        return;
      }

      currentProgram = p;
      gl.useProgram(currentProgram);
      const posLoc = gl.getAttribLocation(currentProgram, 'a_position');
      gl.enableVertexAttribArray(posLoc);
      gl.vertexAttribPointer(posLoc, 2, gl.FLOAT, false, 0, 0);

      startTime = Date.now();
      document.getElementById('info-title').textContent = shader.name;
      document.getElementById('info-desc').textContent = shader.description;
    }

    function render() {
      if (!currentProgram) { requestAnimationFrame(render); return; }
      const t = (Date.now() - startTime) * 0.001;
      gl.uniform1f(gl.getUniformLocation(currentProgram, 'u_time'), t);
      gl.uniform2f(gl.getUniformLocation(currentProgram, 'u_resolution'), canvas.width, canvas.height);
      gl.uniform2f(gl.getUniformLocation(currentProgram, 'u_mouse'), 0, 0);
      gl.uniform1i(gl.getUniformLocation(currentProgram, 'u_frame'), 0);
      gl.drawArrays(gl.TRIANGLE_STRIP, 0, 4);
      requestAnimationFrame(render);
    }

    const sidebar = document.getElementById('shader-list');
    const categories = shadersData.categories;
    let firstBtn = null;

    Object.entries(categories).forEach(([catKey, cat]) => {
      const catDiv = document.createElement('div');
      catDiv.className = 'category';
      catDiv.textContent = uiData.categories[catKey] || cat.name;
      sidebar.appendChild(catDiv);

      cat.shaders.forEach(shaderName => {
        const shaderInfo = implData[shaderName];
        if (!shaderInfo) return;

        const btn = document.createElement('button');
        btn.dataset.shader = shaderName;
        btn.textContent = uiData.shaders[shaderName] || shaderInfo.name;
        btn.addEventListener('click', () => {
          document.querySelectorAll('#sidebar button').forEach(b => b.classList.remove('active'));
          btn.classList.add('active');
          loadShader(shaderName);
        });
        sidebar.appendChild(btn);
        if (!firstBtn) firstBtn = btn;
      });
    });

    if (firstBtn) firstBtn.click();
    render();
  </script>
</body>
</html>
