const scenes = [
  // ========== SCENE 0: POOL ==========
  `precision highp float;
uniform float u_time;
uniform vec2 u_resolution;
uniform vec2 u_mouse;
in vec2 v_uv;

vec2 random2(vec2 p) {
  return fract(sin(vec2(dot(p, vec2(127.1, 311.7)), dot(p, vec2(269.5, 183.3)))) * 43758.5453);
}

float voronoi(vec2 st, float time) {
  vec2 i_st = floor(st);
  vec2 f_st = fract(st);
  float min_dist = 10.0;
  for (int y = -1; y <= 1; y++) {
    for (int x = -1; x <= 1; x++) {
      vec2 neighbor = vec2(float(x), float(y));
      vec2 point = random2(i_st + neighbor);
      point = 0.5 + 0.5 * sin(time + 6.2831 * point);
      float d = length(neighbor + point - f_st);
      min_dist = min(min_dist, d);
    }
  }
  return min_dist;
}

float hash(vec2 p) {
  return fract(sin(dot(p, vec2(127.1, 311.7))) * 43758.5453);
}

float noise(vec2 p) {
  vec2 i = floor(p);
  vec2 f = fract(p);
  f = f * f * (3.0 - 2.0 * f);
  return mix(mix(hash(i), hash(i + vec2(1,0)), f.x),
             mix(hash(i + vec2(0,1)), hash(i + vec2(1,1)), f.x), f.y);
}

float fbm(vec2 p) {
  float v = 0.0, a = 0.5;
  mat2 rot = mat2(cos(0.5), sin(0.5), -sin(0.5), cos(0.5));
  for (int i = 0; i < 5; i++) {
    v += a * noise(p);
    p = rot * p * 2.0;
    a *= 0.5;
  }
  return v;
}

void main() {
  vec2 p = (gl_FragCoord.xy * 2.0 - u_resolution) / min(u_resolution.x, u_resolution.y);
  float t = u_time;
  vec2 mouse = (u_mouse * 2.0 - u_resolution) / min(u_resolution.x, u_resolution.y);

  vec2 uv = p * 4.0;
  uv.x += 0.3 * sin(uv.y * 2.0 + t * 0.8);
  uv.y += 0.2 * cos(uv.x * 3.0 + t * 0.6);

  float v1 = voronoi(uv * 1.0, t * 0.5);
  float v2 = voronoi(uv * 2.0 + 3.7, t * 0.7 + 10.0);
  float v3 = voronoi(uv * 4.0 + 7.3, t * 0.3 + 20.0);

  float caustic1 = 0.02 / max(abs(v1 - 0.15), 0.005);
  float caustic2 = 0.015 / max(abs(v2 - 0.12), 0.005);
  float caustic3 = 0.01 / max(abs(v3 - 0.10), 0.005);
  float caustics = caustic1 + caustic2 * 0.6 + caustic3 * 0.3;

  float depth = 0.5 + 0.5 * p.y;
  vec3 deepColor = vec3(0.02, 0.08, 0.25);
  vec3 shallowColor = vec3(0.1, 0.4, 0.6);
  vec3 poolBase = mix(deepColor, shallowColor, depth * 0.6);

  float edge = 1.0 - smoothstep(0.0, 1.5, length(p));
  vec3 surfaceHighlight = vec3(0.4, 0.7, 0.9) * edge * 0.3;

  vec3 col = poolBase;
  col += vec3(0.3, 0.6, 0.8) * caustics * 0.15;
  col += surfaceHighlight;

  float shimmer = sin(p.x * 15.0 + t) * sin(p.y * 12.0 + t * 0.7);
  col += vec3(0.05, 0.1, 0.15) * shimmer * 0.3;

  float ripples = length(p - mouse * 0.5);
  float ripple = sin(ripples * 20.0 - t * 3.0) * exp(-ripples * 3.0) * 0.3;
  col += vec3(0.2, 0.5, 0.7) * ripple;

  float surface = fbm(uv * 0.5 + t * 0.1);
  col += vec3(0.1, 0.2, 0.3) * surface * 0.2;

  col = col / (col + vec3(1.0));
  gl_FragColor = vec4(col, 1.0);
}`,

  // ========== SCENE 1: DESERT ==========
  `precision highp float;
uniform float u_time;
uniform vec2 u_resolution;
uniform vec2 u_mouse;
in vec2 v_uv;

float hash(vec2 p) {
  return fract(sin(dot(p, vec2(127.1, 311.7))) * 43758.5453);
}

float noise(vec2 p) {
  vec2 i = floor(p);
  vec2 f = fract(p);
  f = f * f * (3.0 - 2.0 * f);
  return mix(mix(hash(i), hash(i + vec2(1,0)), f.x),
             mix(hash(i + vec2(0,1)), hash(i + vec2(1,1)), f.x), f.y);
}

float fbm(vec2 p) {
  float v = 0.0, a = 0.5;
  mat2 rot = mat2(cos(0.5), sin(0.5), -sin(0.5), cos(0.5));
  for (int i = 0; i < 6; i++) {
    v += a * noise(p);
    p = rot * p * 2.0;
    a *= 0.5;
  }
  return v;
}

float sdCactus(vec2 p, float h, float arm1, float arm2) {
  float body = length(p - vec2(0.0, h * 0.5)) - 0.08;
  body = max(body, -(p.y - h));
  body = max(body, -p.y);

  float a1 = length(p - vec2(-0.12, h * 0.6 * arm1)) - 0.05;
  a1 = max(a1, -(abs(p.x + 0.12) - 0.12));
  a1 = max(a1, -(abs(p.y - h * 0.6 * arm1) - 0.06));

  float a2 = length(p - vec2(0.12, h * 0.4 * arm2)) - 0.05;
  a2 = max(a2, -(abs(p.x - 0.12) - 0.12));
  a2 = max(a2, -(abs(p.y - h * 0.4 * arm2) - 0.06));

  return min(body, min(a1, a2));
}

void main() {
  vec2 p = (gl_FragCoord.xy * 2.0 - u_resolution) / min(u_resolution.x, u_resolution.y);
  float t = u_time;

  float dayNight = sin(t * 0.1) * 0.5 + 0.5;

  vec3 skyDay = mix(vec3(0.4, 0.6, 0.9), vec3(1.0, 0.85, 0.6), smoothstep(0.3, 0.7, p.y));
  vec3 skyNight = mix(vec3(0.02, 0.02, 0.08), vec3(0.05, 0.05, 0.15), smoothstep(-0.2, 0.8, p.y));
  vec3 sky = mix(skyNight, skyDay, dayNight);

  float stars = step(0.998, hash(floor(p * 200.0)));
  stars *= (1.0 - dayNight);
  sky += vec3(stars) * 0.8;

  float sunAngle = t * 0.1;
  vec2 sunPos = vec2(cos(sunAngle) * 2.0, sin(sunAngle) * 1.5 - 0.2);
  float sun = 1.0 - smoothstep(0.02, 0.06, length(p - sunPos));
  float sunGlow = 0.1 / max(length(p - sunPos), 0.05);
  sky += vec3(1.0, 0.9, 0.6) * sun * dayNight;
  sky += vec3(0.8, 0.4, 0.2) * sunGlow * 0.1 * dayNight;

  float ground = step(-0.3, p.y);
  float sand = fbm(p * 8.0 + vec2(t * 0.02, 0.0));
  vec3 sandColor = mix(vec3(0.76, 0.6, 0.42), vec3(0.9, 0.75, 0.5), sand);
  sandColor *= mix(0.3, 1.0, dayNight);

  vec3 col = mix(sky, sandColor, ground);

  vec2 cactusPos = vec2(0.2, -0.3);
  float growth = smoothstep(0.0, 20.0, t);
  float cactusH = 0.3 + 0.3 * growth;
  float arm1 = smoothstep(5.0, 15.0, t);
  float arm2 = smoothstep(10.0, 20.0, t);
  float cactus = sdCactus(p - cactusPos, cactusH, arm1, arm2);

  if (cactus < 0.0) {
    vec3 cactusGreen = vec3(0.15, 0.45, 0.15);
    vec3 cactusDark = vec3(0.08, 0.25, 0.08);
    float stripes = sin(p.y * 60.0) * 0.5 + 0.5;
    col = mix(cactusDark, cactusGreen, stripes * 0.3 + 0.7);
    col *= mix(0.3, 1.0, dayNight);
  }

  float cactusShadow = smoothstep(0.02, 0.0, cactus);
  col *= 1.0 - cactusShadow * 0.3;

  float haze = smoothstep(-0.3, -0.1, p.y) * 0.15;
  col = mix(col, vec3(0.9, 0.8, 0.6), haze * dayNight);

  col = pow(col, vec3(0.4545));
  gl_FragColor = vec4(col, 1.0);
}`,

  // ========== SCENE 2: NEBULA ==========
  `precision highp float;
uniform float u_time;
uniform vec2 u_resolution;
uniform vec2 u_mouse;
in vec2 v_uv;

float hash(vec2 p) {
  return fract(sin(dot(p, vec2(127.1, 311.7))) * 43758.5453);
}

float hash3(vec3 p) {
  return fract(sin(dot(p, vec3(127.1, 311.7, 74.7))) * 43758.5453);
}

float noise(vec2 p) {
  vec2 i = floor(p);
  vec2 f = fract(p);
  f = f * f * (3.0 - 2.0 * f);
  return mix(mix(hash(i), hash(i + vec2(1,0)), f.x),
             mix(hash(i + vec2(0,1)), hash(i + vec2(1,1)), f.x), f.y);
}

float fbm(vec2 p) {
  float v = 0.0, a = 0.5;
  mat2 rot = mat2(cos(0.59), sin(0.59), -sin(0.59), cos(0.59));
  for (int i = 0; i < 7; i++) {
    v += a * noise(p);
    p = rot * p * 2.1;
    a *= 0.5;
  }
  return v;
}

vec2 random2(vec2 p) {
  return fract(sin(vec2(dot(p, vec2(127.1, 311.7)), dot(p, vec2(269.5, 183.3)))) * 43758.5453);
}

float voronoi(vec2 st, float time) {
  vec2 i_st = floor(st);
  vec2 f_st = fract(st);
  float min_dist = 10.0;
  float second_dist = 10.0;
  for (int y = -1; y <= 1; y++) {
    for (int x = -1; x <= 1; x++) {
      vec2 neighbor = vec2(float(x), float(y));
      vec2 point = random2(i_st + neighbor);
      point = 0.5 + 0.5 * sin(time + 6.2831 * point);
      float d = length(neighbor + point - f_st);
      if (d < min_dist) {
        second_dist = min_dist;
        min_dist = d;
      } else if (d < second_dist) {
        second_dist = d;
      }
    }
  }
  return second_dist - min_dist;
}

vec2 hash2(vec2 p) {
  return fract(sin(vec2(dot(p, vec2(127.1, 311.7)), dot(p, vec2(269.5, 183.3)))) * 43758.5453);
}

void main() {
  vec2 p = (gl_FragCoord.xy * 2.0 - u_resolution) / min(u_resolution.x, u_resolution.y);
  float t = u_time * 0.05;

  vec3 col = vec3(0.0);

  float n1 = fbm(p * 2.0 + t * 0.3);
  float n2 = fbm(p * 4.0 - t * 0.2 + 5.0);
  float n3 = fbm(p * 1.5 + vec2(n1, n2) * 1.5 + t * 0.1);

  vec3 nebula1 = vec3(0.4, 0.1, 0.6) * smoothstep(0.3, 0.8, n1);
  vec3 nebula2 = vec3(0.1, 0.3, 0.7) * smoothstep(0.4, 0.9, n2);
  vec3 nebula3 = vec3(0.6, 0.15, 0.3) * smoothstep(0.35, 0.85, n3);

  col += nebula1 * 0.4;
  col += nebula2 * 0.3;
  col += nebula3 * 0.25;

  float v = voronoi(p * 8.0 + t * 0.5, t);
  col += vec3(0.15, 0.3, 0.5) * smoothstep(0.0, 0.15, v) * 0.2;

  float dust = fbm(p * 6.0 + t * 0.15 + 10.0);
  col += vec3(0.08, 0.04, 0.12) * dust * 0.5;

  for (int i = 0; i < 200; i++) {
    vec2 starPos = hash2(vec2(float(i), floor(float(i) / 100.0))) * 2.0 - 1.0;
    float brightness = hash(vec2(float(i), float(i) + 100.0));
    float size = 0.001 + brightness * 0.003;
    float twinkle = 0.5 + 0.5 * sin(t * 50.0 + float(i) * 7.0);
    float star = smoothstep(size, 0.0, length(p - starPos));
    vec3 starColor = mix(vec3(0.8, 0.9, 1.0), vec3(1.0, 0.8, 0.6), hash(vec2(float(i), 0.0)));
    col += starColor * star * brightness * twinkle;
  }

  float core = fbm(p * 3.0 + t * 0.2 + 20.0);
  float coreBright = smoothstep(0.55, 0.8, core);
  col += vec3(0.8, 0.5, 0.9) * coreBright * 0.4;

  col = col / (col + vec3(1.0));
  col = pow(col, vec3(0.4545));

  gl_FragColor = vec4(col, 1.0);
}`,

  // ========== SCENE 3: FOREST ==========
  `precision highp float;
uniform float u_time;
uniform vec2 u_resolution;
uniform vec2 u_mouse;
in vec2 v_uv;

float hash(vec2 p) {
  return fract(sin(dot(p, vec2(127.1, 311.7))) * 43758.5453);
}

float noise(vec2 p) {
  vec2 i = floor(p);
  vec2 f = fract(p);
  f = f * f * (3.0 - 2.0 * f);
  return mix(mix(hash(i), hash(i + vec2(1,0)), f.x),
             mix(hash(i + vec2(0,1)), hash(i + vec2(1,1)), f.x), f.y);
}

float fbm(vec2 p) {
  float v = 0.0, a = 0.5;
  mat2 rot = mat2(cos(0.59), sin(0.59), -sin(0.59), cos(0.59));
  for (int i = 0; i < 6; i++) {
    v += a * noise(p);
    p = rot * p * 2.0;
    a *= 0.5;
  }
  return v;
}

float sdTree(vec2 p, float h, float sway) {
  float trunk = abs(p.x - sway * 0.02 * p.y) - 0.015 - 0.005 * p.y;
  trunk = max(trunk, -(p.y - h * 0.6));

  float crown = length((p - vec2(sway * 0.04, h * 0.75)) * vec2(1.0, 0.7)) - h * 0.3;
  crown = min(crown, length((p - vec2(sway * 0.03, h * 0.9)) * vec2(1.0, 0.6)) - h * 0.2);

  return min(trunk, crown);
}

void main() {
  vec2 p = (gl_FragCoord.xy * 2.0 - u_resolution) / min(u_resolution.x, u_resolution.y);
  float t = u_time;

  vec2 uv = p;

  vec3 col = vec3(0.0);

  float fog = fbm(p * 2.0 + t * 0.05);
  vec3 fogColor = mix(vec3(0.15, 0.2, 0.1), vec3(0.25, 0.35, 0.2), fog);
  col = fogColor;

  vec3 skyColor = mix(vec3(0.1, 0.15, 0.05), vec3(0.3, 0.45, 0.2), smoothstep(-0.2, 0.5, p.y));
  col = mix(fogColor * 0.5, skyColor, smoothstep(-0.1, 0.8, p.y) * 0.3);

  float ground = 1.0 - smoothstep(-0.5, -0.3, p.y);
  vec3 groundColor = mix(vec3(0.08, 0.12, 0.04), vec3(0.15, 0.2, 0.08), noise(p * 20.0));
  float moss = fbm(p * 15.0 + 5.0);
  groundColor += vec3(0.05, 0.08, 0.02) * moss;
  col = mix(col, groundColor, ground);

  float sway = sin(t * 0.8);

  for (int i = 0; i < 8; i++) {
    float fi = float(i);
    float x = (hash(vec2(fi, 1.0)) - 0.5) * 2.5;
    float depth = 0.3 + hash(vec2(fi, 2.0)) * 0.7;
    float h = 0.4 + hash(vec2(fi, 3.0)) * 0.4;
    float treeSway = sin(t * 0.5 + fi * 1.3) * 0.3;

    vec2 tp = (p - vec2(x * depth, -0.3)) / depth;
    float tree = sdTree(tp, h, treeSway);

    vec3 trunkColor = vec3(0.25, 0.15, 0.08);
    vec3 leafColor = mix(vec3(0.05, 0.2, 0.05), vec3(0.15, 0.35, 0.08), hash(vec2(fi, 4.0)));
    float leafNoise = fbm(tp * 8.0 + fi);
    leafColor += vec3(0.05, 0.1, 0.02) * leafNoise;

    if (tree < 0.0) {
      float t2 = abs(tp.x) < 0.02 ? 1.0 : 0.0;
      vec3 treeCol = mix(leafColor, trunkColor, step(0.5, tp.y / h));
      treeCol *= mix(0.3, 1.0, depth);
      col = treeCol;
    }
  }

  float lightRays = 0.0;
  for (int i = 0; i < 5; i++) {
    float fi = float(i);
    float angle = 0.3 + fi * 0.15;
    float ray = abs(p.x - p.y * cos(angle) * 0.3 - hash(vec2(fi, 5.0)) * 0.5);
    float brightness = 0.02 / max(ray, 0.005);
    float flicker = 0.7 + 0.3 * sin(t * 0.3 + fi * 2.0);
    lightRays += brightness * flicker * 0.05;
  }
  col += vec3(0.3, 0.4, 0.2) * lightRays * smoothstep(-0.5, 0.3, p.y);

  float particles = 0.0;
  for (int i = 0; i < 30; i++) {
    float fi = float(i);
    vec2 particlePos = vec2(
      sin(t * 0.2 + fi * 0.7) * 0.8 + hash(vec2(fi, 6.0)) * 0.4 - 0.2,
      fract(t * 0.05 + hash(vec2(fi, 7.0))) * 1.2 - 0.4
    );
    float d = length(p - particlePos);
    float sparkle = 0.003 / max(d, 0.001);
    particles += sparkle * 0.01;
  }
  col += vec3(0.5, 0.6, 0.3) * particles;

  float groundFog = smoothstep(-0.3, -0.45, p.y);
  vec3 groundFogCol = vec3(0.15, 0.2, 0.12) * (0.8 + 0.2 * sin(t * 0.2));
  col = mix(col, groundFogCol, groundFog * 0.6);

  col = col / (col + vec3(1.0));
  col = pow(col, vec3(0.4545));

  gl_FragColor = vec4(col, 1.0);
}`,

  // ========== SCENE 4: EARTH-MOON-SUN ==========
  `precision highp float;
uniform float u_time;
uniform vec2 u_resolution;
uniform vec2 u_mouse;
in vec2 v_uv;

float hash(vec2 p) {
  return fract(sin(dot(p, vec2(127.1, 311.7))) * 43758.5453);
}

float noise(vec2 p) {
  vec2 i = floor(p);
  vec2 f = fract(p);
  f = f * f * (3.0 - 2.0 * f);
  return mix(mix(hash(i), hash(i + vec2(1,0)), f.x),
             mix(hash(i + vec2(0,1)), hash(i + vec2(1,1)), f.x), f.y);
}

float fbm(vec2 p) {
  float v = 0.0, a = 0.5;
  mat2 rot = mat2(0.8, 0.6, -0.6, 0.8);
  for (int i = 0; i < 6; i++) { v += a * noise(p); p = rot * p * 2.1; a *= 0.5; }
  return v;
}

vec3 g_sunPos = vec3(4.0, 2.0, -3.0);
vec3 g_moonPos;

float sdSphere(vec3 p, float r) { return length(p) - r; }

float mapScene(vec3 p) {
  float sun  = sdSphere(p - g_sunPos, 0.5);
  float earth = sdSphere(p, 0.3);
  float moon  = sdSphere(p - g_moonPos, 0.08);
  return min(min(sun, earth), moon);
}

struct Hit { float t; vec3 normal; vec3 pos; int obj; };

Hit castRay(vec3 ro, vec3 rd) {
  Hit h; h.t = -1.0; h.obj = -1;
  float t = 0.01;
  for (int i = 0; i < 120; i++) {
    vec3 p = ro + rd * t;
    float d = mapScene(p);
    if (d < 0.0003) break;
    t += d;
    if (t > 30.0) return h;
  }
  h.t = t;
  h.pos = ro + rd * t;
  float e = 0.0005;
  h.normal = normalize(vec3(
    mapScene(h.pos + vec3(e,0,0)) - mapScene(h.pos - vec3(e,0,0)),
    mapScene(h.pos + vec3(0,e,0)) - mapScene(h.pos - vec3(0,e,0)),
    mapScene(h.pos + vec3(0,0,e)) - mapScene(h.pos - vec3(0,0,e))
  ));

  vec3 p = h.pos;
  float ds = sdSphere(p - g_sunPos, 0.5);
  float de = sdSphere(p, 0.3);
  float dm = sdSphere(p - g_moonPos, 0.08);
  if (ds < de && ds < dm) h.obj = 2;
  else if (de < dm) h.obj = 0;
  else h.obj = 1;
  return h;
}

float softShadow(vec3 ro, vec3 rd) {
  float res = 1.0;
  float t = 0.05;
  for (int i = 0; i < 48; i++) {
    float d = mapScene(ro + rd * t);
    if (d < 0.0002) return 0.05;
    res = min(res, 10.0 * d / t);
    t += clamp(d, 0.02, 0.3);
    if (t > 8.0) break;
  }
  return clamp(res, 0.0, 1.0);
}

vec3 shade(Hit h) {
  vec3 sunColor = vec3(1.0, 0.95, 0.8);

  if (h.obj < 0) {
    float stars = step(0.9997, hash(floor(v_uv * 600.0)));
    return mix(vec3(0.0, 0.0, 0.02), vec3(0.8), stars);
  }

  vec3 N = h.normal;
  vec3 L = normalize(g_sunPos - h.pos);
  vec3 V = normalize(-L);
  vec3 R = reflect(L, N);
  float shadow = softShadow(h.pos + N * 0.002, L);
  float diff = max(dot(N, L), 0.0);
  float spec = pow(max(dot(V, R), 0.0), 64.0);
  float amb = 0.04;

  vec3 baseColor;
  if (h.obj == 0) {
    float lon = atan(N.z, N.x);
    float lat = asin(N.y);
    vec2 uv = vec2(lon / 3.14159 * 0.5 + 0.5, lat / 3.14159 + 0.5);
    float land = fbm(uv * 5.0 + 1.5);
    float isLand = smoothstep(0.48, 0.52, land);
    vec3 ocean = vec3(0.04, 0.15, 0.45);
    vec3 grass = vec3(0.08, 0.38, 0.12);
    vec3 desert = vec3(0.65, 0.52, 0.32);
    vec3 biome = mix(ocean, mix(grass, desert, smoothstep(0.56, 0.66, land)), isLand);
    vec3 cloud = vec3(1.0) * smoothstep(0.55, 0.7, fbm(uv * 3.5 + 5.0)) * 0.35;
    vec3 ice = vec3(0.85, 0.9, 0.95) * smoothstep(0.45, 0.5, abs(lat));
    baseColor = biome + cloud;
    baseColor = mix(baseColor, ice, smoothstep(0.42, 0.5, abs(lat)));
  } else if (h.obj == 1) {
    float lon = atan(N.z, N.x);
    float lat = asin(N.y);
    float crater = fbm(vec2(lon, lat) * 4.0 + 10.0);
    float craterShape = smoothstep(0.4, 0.55, crater);
    vec3 moonBase = vec3(0.6, 0.58, 0.55);
    baseColor = moonBase - vec3(0.1) * craterShape;
  } else {
    baseColor = vec3(1.0, 0.92, 0.6);
    float flare = fbm(vec2(atan(N.z, N.x) * 4.0, u_time * 0.3));
    baseColor += vec3(0.15, 0.08, 0.0) * flare;
  }

  vec3 col = baseColor * (amb + diff * shadow * 0.85) + sunColor * spec * shadow * 0.25;
  col += baseColor * amb * vec3(0.1, 0.12, 0.25);
  return col;
}

void main() {
  vec2 uv = (gl_FragCoord.xy * 2.0 - u_resolution) / min(u_resolution.x, u_resolution.y);
  float t = u_time;

  float moonOrbit = t * 0.8;
  g_moonPos = vec3(cos(moonOrbit) * 0.7, sin(moonOrbit * 0.4) * 0.12, sin(moonOrbit) * 0.7);

  vec3 ro = vec3(0.0, 0.35, 2.0);
  vec3 lookAt = vec3(0.0, 0.0, 0.0);
  vec3 forward = normalize(lookAt - ro);
  vec3 right = normalize(cross(forward, vec3(0.0, 1.0, 0.0)));
  vec3 up = cross(right, forward);
  vec3 rd = normalize(forward + uv.x * right + uv.y * up);

  Hit h = castRay(ro, rd);
  vec3 col = shade(h);

  float sunDist = length(uv - vec2(0.6, -0.3));
  col += vec3(1.0, 0.95, 0.8) * 0.015 / max(sunDist * sunDist, 0.005);

  col = col / (col + vec3(1.0));
  col = pow(col, vec3(0.4545));
  gl_FragColor = vec4(col, 1.0);
}`,

  // ========== SCENE 5: FRACTAL ==========
  `precision highp float;
uniform float u_time;
uniform vec2 u_resolution;
uniform vec2 u_mouse;
in vec2 v_uv;

vec3 palette(float t) {
  vec3 a = vec3(0.5, 0.5, 0.5);
  vec3 b = vec3(0.5, 0.5, 0.5);
  vec3 c = vec3(1.0, 1.0, 1.0);
  vec3 d = vec3(0.00, 0.10, 0.20);
  return a + b * cos(6.28318 * (c * t + d));
}

void main() {
  vec2 uv = (gl_FragCoord.xy * 2.0 - u_resolution) / min(u_resolution.x, u_resolution.y);
  float t = u_time;

  float mode = mod(floor(t / 8.0), 3.0);

  vec2 c;
  vec2 z;

  if (mode < 0.5) {
    float zoom = pow(0.5, t * 0.3);
    vec2 center = vec2(-0.745, 0.186);
    c = uv * zoom + center;
    z = vec2(0.0);
  } else if (mode < 1.5) {
    float angle = t * 0.2;
    c = vec2(0.355 + 0.1 * sin(angle), 0.355 + 0.1 * cos(angle));
    z = uv * 1.5;
  } else {
    float angle = t * 0.15;
    c = vec2(-0.7, 0.27015);
    z = uv * 1.2 + 0.5 * vec2(sin(angle), cos(angle));
  }

  float iter = 0.0;
  float maxIter = 200.0;
  for (float i = 0.0; i < 200.0; i++) {
    z = vec2(z.x * z.x - z.y * z.y, 2.0 * z.x * z.y) + c;
    if (dot(z, z) > 4.0) break;
    iter++;
  }

  vec3 col;
  if (iter >= maxIter - 0.5) {
    col = vec3(0.0);
  } else {
    float smoothIter = iter - log2(log2(dot(z, z))) + 4.0;
    col = palette(smoothIter * 0.02 + t * 0.05);
    col *= smoothstep(0.0, 0.7, smoothIter / maxIter);
  }

  float vignette = 1.0 - 0.3 * length(uv);
  col *= vignette;

  gl_FragColor = vec4(col, 1.0);
}`,

  // ========== SCENE 6: CLOUDS ==========
  `precision highp float;
uniform float u_time;
uniform vec2 u_resolution;
uniform vec2 u_mouse;
in vec2 v_uv;

float hash(vec2 p) {
  return fract(sin(dot(p, vec2(127.1, 311.7))) * 43758.5453);
}

float noise(vec3 p) {
  vec3 i = floor(p);
  vec3 f = fract(p);
  f = f * f * (3.0 - 2.0 * f);
  float n = mix(
    mix(mix(hash(i.xz + vec2(0,0) + i.y*17.0), hash(i.xz + vec2(1,0) + i.y*17.0), f.x),
        mix(hash(i.xz + vec2(0,1) + i.y*17.0), hash(i.xz + vec2(1,1) + i.y*17.0), f.x), f.z),
    mix(mix(hash(i.xz + vec2(0,0) + (i.y+1.0)*17.0), hash(i.xz + vec2(1,0) + (i.y+1.0)*17.0), f.x),
        mix(hash(i.xz + vec2(0,1) + (i.y+1.0)*17.0), hash(i.xz + vec2(1,1) + (i.y+1.0)*17.0), f.x), f.z),
    f.y
  );
  return n;
}

float fbm3d(vec3 p) {
  float v = 0.0, a = 0.5;
  vec3 shift = vec3(100.0);
  for (int i = 0; i < 6; i++) {
    v += a * noise(p);
    p = p * 2.0 + shift;
    a *= 0.5;
  }
  return v;
}

float cloudDensity(vec3 p) {
  float d = fbm3d(p);
  d = smoothstep(0.35, 0.85, d);
  return d;
}

void main() {
  vec2 uv = (gl_FragCoord.xy * 2.0 - u_resolution) / min(u_resolution.x, u_resolution.y);
  float t = u_time * 0.08;

  vec3 ro = vec3(0.0, 0.0, t);
  vec3 rd = normalize(vec3(uv, 1.0));

  vec3 sunDir = normalize(vec3(0.5, 0.3, 0.8));
  vec3 sunColor = vec3(1.0, 0.85, 0.6);

  vec3 skyTop = vec3(0.25, 0.45, 0.85);
  vec3 skyBot = vec3(0.7, 0.8, 0.95);
  vec3 sky = mix(skyBot, skyTop, smoothstep(-0.2, 0.8, rd.y));

  float sunDot = dot(rd, sunDir);
  sky += sunColor * pow(max(sunDot, 0.0), 64.0) * 0.5;
  sky += vec3(1.0, 0.6, 0.3) * pow(max(sunDot, 0.0), 8.0) * 0.2;

  vec3 col = sky;
  float transmittance = 1.0;
  vec3 accumulated = vec3(0.0);

  for (int i = 0; i < 64; i++) {
    float fi = float(i);
    float tHit = 0.5 + fi * 0.15;
    vec3 p = ro + rd * tHit;

    float density = cloudDensity(p * vec3(0.8, 0.5, 0.8) + vec3(t * 0.5, 0.0, 0.0));

    if (density > 0.01) {
      float lightDensity = 0.0;
      for (int j = 0; j < 8; j++) {
        vec3 lightP = p + sunDir * float(j) * 0.3;
        lightDensity += cloudDensity(lightP * vec3(0.8, 0.5, 0.8) + vec3(t * 0.5, 0.0, 0.0)) * 0.15;
      }
      float lightTransmittance = exp(-lightDensity);
      vec3 lightColor = sunColor * lightTransmittance;

      float silver = pow(max(dot(rd, sunDir), 0.0), 4.0) * 0.3;
      vec3 cloudCol = mix(vec3(0.5, 0.55, 0.65), lightColor * 1.2, 0.5 + silver);

      float stepT = exp(-density * 0.15);
      accumulated += transmittance * (1.0 - stepT) * cloudCol;
      transmittance *= stepT;
    }

    if (transmittance < 0.01) break;
  }

  col = accumulated + sky * transmittance;

  float ground = smoothstep(-0.1, -0.3, rd.y);
  vec3 groundColor = vec3(0.2, 0.25, 0.15);
  col = mix(col, groundColor, ground * 0.6);

  col = col / (col + vec3(1.0));
  col = pow(col, vec3(0.4545));

  gl_FragColor = vec4(col, 1.0);
}`
];

const renderer = new THREE.WebGLRenderer();
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
document.body.prepend(renderer.domElement);

let currentScene = 0;
const uniforms = {
  u_time: { value: 0 },
  u_resolution: { value: new THREE.Vector2(window.innerWidth, window.innerHeight) },
  u_mouse: { value: new THREE.Vector2(0, 0) }
};

function createMaterial(fragShader) {
  return new THREE.ShaderMaterial({
    vertexShader,
    fragmentShader: fragShader,
    uniforms
  });
}

const geo = new THREE.PlaneGeometry(2, 2);
const mat = createMaterial(scenes[0]);
const mesh = new THREE.Mesh(geo, mat);
const scene = new THREE.Scene();
scene.add(mesh);
const cam = new THREE.OrthographicCamera(-1, 1, 1, -1, 0, 1);

const techTitle = document.getElementById('tech-title');
const techList = document.getElementById('tech-list');

function updateTech(idx) {
  const info = sceneInfo[idx];
  techTitle.textContent = info.title;
  techList.innerHTML = info.tech.map(([name, desc]) =>
    '<li><strong>' + name + '</strong> — ' + desc + '</li>'
  ).join('');
}
updateTech(0);

document.querySelectorAll('#nav button').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('#nav button').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentScene = parseInt(btn.dataset.scene);
    mat.fragmentShader = scenes[currentScene];
    mat.needsUpdate = true;
    updateTech(currentScene);
  });
});

window.addEventListener('mousemove', e => {
  uniforms.u_mouse.value.set(e.clientX, window.innerHeight - e.clientY);
});

window.addEventListener('resize', () => {
  renderer.setSize(window.innerWidth, window.innerHeight);
  uniforms.u_resolution.value.set(window.innerWidth, window.innerHeight);
});

const clock = new THREE.Clock();
function animate() {
  uniforms.u_time.value = clock.getElapsedTime();
  renderer.render(scene, cam);
  requestAnimationFrame(animate);
}
animate();
  </script>
